server:
  port: ${PORT:8082}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobnexus_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 0
      connection-timeout: 30000
      max-lifetime: 600000
      idle-timeout: 120000
      data-source-properties:
        prepareThreshold: 0
        preparedStatementCacheQueries: 0
        preparedStatementCacheSizeMiB: 0
        preferQueryMode: simple
        autosave: conservative
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration: 86400000

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD}

google:
  client-id: ${GOOGLE_CLIENT_ID}

aws:
  s3:
    bucketName: ${AWS_S3_BUCKET_NAME}
    accessKey: ${AWS_ACCESS_KEY}
    secretKey: ${AWS_SECRET_KEY}
    region: ${AWS_REGION}
    endpointUrl: ${AWS_S3_ENDPOINT_URL}
openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini
  max-tokens: 3000
  base-url: https://api.openai.com/v1

vnpay:
  url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  tmn-code: ${VNPAY_TMN_CODE:2Y0P3N8L}
  hash-secret: ${VNPAY_HASH_SECRET:1BX5VZOVDP8G19NJCYVC4OZW2V5XXLZG}
  return-url: http://localhost:8082/payment/vnpay-return
  ip-addr: 127.0.0.1
