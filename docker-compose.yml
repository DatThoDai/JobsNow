services:
  jobsnow-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobsnow-backend
    depends_on:
      - redis
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis:
    image: redis/redis-stack:7.2.0-v20
    container_name: redis-stack
    ports:
      - "6379:6379"
      - "8001:8001"
    environment:
      REDIS_ARGS: "--requirepass ${REDIS_PASSWORD}"
    restart: unless-stopped
