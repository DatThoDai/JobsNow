services:
  jobsnow-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobsnow-backend
    ports:
      - "8082:8082"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
